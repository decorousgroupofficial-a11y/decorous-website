services:
  - type: web
    name: decorous-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        sync: false
      - key: CORS_ORIGINS
        value: https://decorous.in,https://app.decorous.in
      - key: ADMIN_PASSWORD
        sync: false
      - key: ERP_JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: NOTIFICATION_EMAIL
        value: contact@decorous.in
      - key: WHATSAPP_NUMBER
        value: "917008863329"
