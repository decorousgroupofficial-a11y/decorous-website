version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: decorous-erp-pg
    environment:
      POSTGRES_USER: decorous
      POSTGRES_PASSWORD: decorous
      POSTGRES_DB: decorous_erp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: decorous-erp-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
